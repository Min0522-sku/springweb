# application.properties 파일은 항상 resources 바로 아래 만든다.
# 목적: 스프링 서버가 실행될 때 설정을 로딩하는 파일
# 참고 : 상단메뉴 -> 설정 -> 파일 인코딩 메뉴 -> 프로퍼티 파일의 대한 디폴트 인코딩 : UTF-8 변경


# 1. 내장 AWS PORT(프로그램 식별번호) 번호 변경 , 기본값은 8080 수정 가능
server.port = 8080

# 2. DAO 가 아닌 프로퍼티 파일에서 DB 연동 가능하다. JDBC
# 2-1 연동할 db서버의 주소
spring.datasource.url = jdbc:mysql://localhost:3306/springweb
# 2-2 연동할 db서버의 계정/비밀번호  띄어쓰기 주의
spring.datasource.username = root
spring.datasource.password = 0950


#2-3 Entity 테이블 생성, DDL : sql 정의어
# create : 서버실행할때마다 삭제후 생성
# update : 서버실행할때마다 존재하면 수정 존재하지 않으면 생성
# none : 사용안함
spring.jpa.hibernate.ddl-auto=create

# 2-4 콘솔창에 실행된 sql 표시
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# sql 내 매개변수 값들을 표시
logging.level.org.hibernate.jdbc.bind = TRACE
logging.level.org.hibernate.sql = DEBUG

# 2-5 서버를 실행 할때 SQL 파일 실행 *개발단계* , always ,none
spring.sql.init.mode = always
# 2-6 서버 실행 할때 classpath(resources폴더) 이하에 data.sql 파일 경로 지정
spring.sql.init.data-locations=classpath:/sql/data.sql
# 2-7 서버 실행 할때 JPA가 초기화 파일 실행
spring.jpa.defer-datasource-initialization=true